{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{- with .Data.Terms.Alphabetical }}
    <nav class="tags">
      {{- range . }}
        <a href="{{ .Page.RelPermalink }}">{{ .Page.Title }}<span class="tag-count">{{ .Count }}</span></a>
      {{- end }}
    </nav>
  {{- end }}
{{ end }}
